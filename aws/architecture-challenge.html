<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Architecture Challenge — AWS SAA-C03 Prep</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Page-specific styles; reuses css/style.css variables. Dark mode:
       page-local @media (prefers-color-scheme: dark) override block
       re-mapping the site palette exactly like vpc-explorer.html does —
       copy that block's --color-* overrides verbatim, then the arch-*
       surface variables below. */
    :root {
      --arch-surface: #fff;
      --arch-surface-muted: #f3f4f6;
      --arch-fail-bg: #fef2f2;
      --arch-ok-bg: #f0fdf4;
      --oc-dot: #dfe2e8;  /* canvas grid dots */
    }
    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        /* --color-* overrides copied from vpc-explorer.html */
        --color-bg: #0f172a;
        --color-text: #e2e8f0;
        --color-muted: #94a3b8;
        --color-border: #334155;
        --color-primary: #3b82f6;
        --color-primary-dark: #2563eb;
        --color-success: #4ade80;
        --color-danger: #f87171;
        --arch-surface: #1e293b;
        --arch-surface-muted: #334155;
        --arch-fail-bg: #450a0a;
        --arch-ok-bg: #052e16;
        --oc-dot: #33415c;
      }
    }
    #arch-content { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
    /* Landing */
    .arch-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .arch-card { border: 1px solid var(--color-border); border-radius: 8px; padding: 1rem;
                 background: var(--arch-surface); text-decoration: none; color: inherit; display: block; }
    .arch-card:hover { border-color: var(--color-primary); }
    .arch-card .badge-done { color: var(--color-success); font-weight: 600; }
    /* Workbench: task pane on top, full-width canvas below */
    .arch-workbench { display: flex; flex-direction: column; gap: 1rem; }
    /* AWS-diagram category accents (approximate AWS icon palette) */
    .oc-cat-client { --cat-color: #64748b; }
    .oc-cat-edge { --cat-color: #8c4fff; }
    .oc-cat-security { --cat-color: #dd344c; }
    .oc-cat-compute { --cat-color: #ed7100; }
    .oc-cat-containers { --cat-color: #ed7100; }
    .oc-cat-storage { --cat-color: #7aa116; }
    .oc-cat-database { --cat-color: #c925d1; }
    .oc-cat-integration { --cat-color: #e7157b; }
    .oc-cat-iot { --cat-color: #3f8624; }
    .oc-cat-observability { --cat-color: #b0084d; }
    /* Add chips, grouped by category */
    .cg-add-row { margin-bottom: 0.6rem; gap: 0.35rem 0.75rem; }
    .oc-chip-group { display: inline-flex; flex-wrap: wrap; gap: 0.3rem; align-items: center; }
    .oc-chip-label { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.05em;
                     color: var(--color-muted); margin-right: 0.1rem; }
    button.oc-add-chip { background: transparent; color: var(--cat-color, var(--color-primary));
                         border: 1px dashed var(--color-border); font-size: 0.75rem;
                         padding: 0.18rem 0.5rem; border-radius: 999px; }
    button.oc-add-chip:hover { border-color: var(--cat-color, var(--color-primary)); }
    /* Service diagram canvas */
    .oc-canvas { position: relative; overflow: auto; height: 72vh; min-height: 520px;
                 border: 1px solid var(--color-border); border-radius: 8px; background: var(--arch-surface); }
    .oc-surface { position: relative;
                  background-image: radial-gradient(circle, var(--oc-dot) 1px, transparent 1px);
                  background-size: 24px 24px; }
    .oc-card { position: absolute; background: var(--arch-surface); border: 1px solid var(--color-border);
               border-top: 3px solid var(--cat-color, var(--color-border)); border-radius: 10px;
               padding: 0.45rem 0.6rem; cursor: grab; user-select: none; touch-action: none; }
    .oc-card.oc-dragging { cursor: grabbing; z-index: 30; opacity: 0.92; }
    .oc-card.oc-selected { border-color: var(--color-primary); outline: 1.5px solid var(--color-primary); }
    .oc-card.oc-can-accept { outline: 2px dashed var(--color-success); outline-offset: 2px; }
    .oc-card input, .oc-card select { cursor: auto; user-select: auto; }
    .oc-card input.oc-name { width: 100%; font-weight: 600; font-size: 0.85rem;
                             border: 1px solid transparent; background: transparent; }
    .oc-card input.oc-name:hover, .oc-card input.oc-name:focus { border-color: var(--color-border); }
    .oc-type { font-family: ui-monospace, monospace; font-size: 0.7rem; color: var(--cat-color, var(--color-primary));
               cursor: help; margin: 0.15rem 0 0.1rem; }
    .oc-role { display: flex; gap: 0.4rem; align-items: center; margin-top: 0.3rem; }
    .oc-role select { flex: 1; min-width: 0; font-size: 0.75rem; }
    .cg-label { font-family: ui-monospace, monospace; font-size: 0.7rem; color: var(--color-muted); cursor: help; }
    .oc-fdot { position: absolute; width: 11px; height: 11px; border-radius: 50%; background: var(--arch-surface);
               border: 1.5px solid var(--color-primary); opacity: 0; transition: opacity 80ms;
               cursor: crosshair; z-index: 5; top: 50%; margin-top: -6px; touch-action: none; }
    .oc-card:hover .oc-fdot, .oc-card.oc-selected .oc-fdot { opacity: 1; }
    .oc-fdot-e { right: -7px; }
    .oc-fdot-w { left: -7px; }
    .oc-edges { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
    .oc-edges path.oc-edge { fill: none; stroke: var(--color-muted); stroke-width: 1.6; }
    .oc-edges path.oc-edge-selected { stroke: var(--color-primary); stroke-width: 2.2; }
    .oc-edges path.oc-edge-temp { stroke: var(--color-primary); stroke-dasharray: 6 5; }
    .oc-edges path.oc-hit { fill: none; pointer-events: stroke; stroke: transparent; stroke-width: 12; cursor: pointer; }
    .oc-arrhead { fill: var(--color-muted); }
    .oc-arrhead-selected { fill: var(--color-primary); }
    .oc-toolbar { position: absolute; z-index: 40; background: var(--arch-surface); border: 1px solid var(--color-border);
                  border-radius: 8px; padding: 2px 4px; box-shadow: 0 4px 14px rgba(0,0,0,0.3); }
    .oc-toolbar button { background: transparent; border: none; color: var(--color-danger); font-size: 0.9rem; }
    #arch-forms input, #arch-forms select { font: inherit; padding: 0.2rem 0.35rem;
                                            border-radius: 4px; background: var(--arch-surface); color: inherit; min-width: 0; }
    #arch-forms select { border: 1px solid var(--color-border); }
    .arch-panel { border: 1px solid var(--color-border); border-radius: 8px;
                  background: var(--arch-surface); padding: 1rem; }
    .arch-panel h2 { font-size: 1rem; margin: 0 0 0.75rem; }
    .arch-row { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; margin-bottom: 0.4rem; }
    .arch-mini { font-size: 0.8rem; color: var(--color-muted); }
    /* Task panel */
    .arch-goal { border-left: 3px solid var(--color-border); padding: 0.4rem 0.6rem; margin-bottom: 0.5rem; }
    .arch-goal.ok { border-left-color: var(--color-success); background: var(--arch-ok-bg); }
    .arch-goal.fail { border-left-color: var(--color-danger); background: var(--arch-fail-bg); }
    .arch-trace { font-size: 0.82rem; margin: 0.3rem 0 0; padding-left: 1.1rem; }
    .arch-trace li.ok::marker { content: "✓ "; color: var(--color-success); }
    .arch-trace li.fail::marker { content: "✗ "; color: var(--color-danger); }
    .arch-score { font-size: 1.4rem; font-weight: 700; }
  </style>
</head>
<body>
  <header class="site-header">
    <h1>Architecture Challenge</h1>
    <nav id="nav"><a href="index.html">← SAA-C03 Prep Home</a> <a href="vpc-explorer.html">VPC Explorer</a></nav>
  </header>
  <main id="arch-content">
    <section id="arch-landing" hidden></section>
    <section id="arch-workbench" hidden>
      <div id="arch-head"></div>
      <div class="arch-workbench">
        <div class="arch-panel" id="arch-task" aria-label="Task and results"></div>
        <div class="arch-panel" id="arch-forms" aria-label="Architecture diagram canvas"></div>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <p>Unofficial study tool. Not affiliated with AWS. Progress stored locally in your browser.</p>
  </footer>
  <script type="module" src="js/arch-challenge.js"></script>
</body>
</html>
