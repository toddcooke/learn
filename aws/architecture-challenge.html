<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Architecture Challenge — AWS SAA-C03 Prep</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Page-specific styles; reuses css/style.css variables. Dark mode:
       page-local @media (prefers-color-scheme: dark) override block
       re-mapping the site palette exactly like vpc-explorer.html does —
       copy that block's --color-* overrides verbatim, then the arch-*
       surface variables below. */
    :root {
      --arch-surface: #fff;
      --arch-surface-muted: #f3f4f6;
      --arch-fail-bg: #fef2f2;
      --arch-ok-bg: #f0fdf4;
      --oc-dot: #dfe2e8;  /* canvas grid dots */
    }
    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        /* --color-* overrides copied from vpc-explorer.html */
        --color-bg: #0f172a;
        --color-text: #e2e8f0;
        --color-muted: #94a3b8;
        --color-border: #334155;
        --color-primary: #3b82f6;
        --color-primary-dark: #2563eb;
        --color-success: #4ade80;
        --color-danger: #f87171;
        --arch-surface: #1e293b;
        --arch-surface-muted: #334155;
        --arch-fail-bg: #450a0a;
        --arch-ok-bg: #052e16;
        --oc-dot: #33415c;
      }
    }
    #arch-content { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
    /* Landing */
    .arch-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .arch-card { border: 1px solid var(--color-border); border-radius: 8px; padding: 1rem;
                 background: var(--arch-surface); text-decoration: none; color: inherit; display: block; }
    .arch-card:hover { border-color: var(--color-primary); }
    .arch-card .badge-done { color: var(--color-success); font-weight: 600; }
    /* Workbench: form builder + task pane, stacking on narrow screens */
    .arch-workbench { display: grid; grid-template-columns: minmax(0, 1fr) 400px; gap: 1rem; align-items: start; }
    @media (max-width: 1100px) { .arch-workbench { grid-template-columns: 1fr; } }
    /* Obsidian-style resource canvas */
    .cg-add-row { margin-bottom: 0.6rem; }
    .oc-canvas { position: relative; overflow: auto; height: 75vh; min-height: 560px;
                 border: 1px solid var(--color-border); border-radius: 8px; background: var(--arch-surface); }
    .oc-surface { position: relative;
                  background-image: radial-gradient(circle, var(--oc-dot) 1px, transparent 1px);
                  background-size: 24px 24px; }
    .oc-lane { position: absolute; top: 0; border-left: 1px dashed var(--color-border); pointer-events: none; }
    .oc-lane-global { border-left: none; }
    .oc-lane-label { display: inline-block; margin: 8px 0 0 10px; font-size: 0.7rem;
                     text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-muted); }
    .oc-card { position: absolute; background: var(--arch-surface); border: 1px solid var(--color-border);
               border-radius: 10px; padding: 0.5rem 0.65rem; cursor: grab; user-select: none; }
    .oc-card.oc-dragging { cursor: grabbing; z-index: 30; opacity: 0.92; }
    .oc-card.oc-selected { border-color: var(--color-primary); outline: 1.5px solid var(--color-primary); }
    .oc-card.oc-can-accept { outline: 2px dashed var(--color-success); outline-offset: 2px; }
    .oc-card input, .oc-card select, .oc-card button { cursor: auto; user-select: auto; }
    .oc-dot { position: absolute; width: 11px; height: 11px; border-radius: 50%; background: var(--arch-surface);
              border: 1.5px solid var(--color-primary); opacity: 0; transition: opacity 80ms; cursor: crosshair; z-index: 5; }
    .oc-card:hover .oc-dot, .oc-card.oc-selected .oc-dot { opacity: 1; }
    .oc-dot[data-side="n"] { top: -6px; left: calc(50% - 6px); }
    .oc-dot[data-side="s"] { bottom: -6px; left: calc(50% - 6px); }
    .oc-dot[data-side="e"] { right: -6px; top: calc(50% - 6px); }
    .oc-dot[data-side="w"] { left: -6px; top: calc(50% - 6px); }
    .oc-az-badge { font-size: 0.68rem; color: var(--color-muted); margin: 0.1rem 0 0.3rem; }
    .oc-edges { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
    .oc-edges path.oc-edge { fill: none; stroke: var(--color-muted); stroke-width: 1.6; }
    .oc-edges path.oc-edge-selected { stroke: var(--color-primary); stroke-width: 2.2; }
    .oc-edges path.oc-edge-temp { stroke: var(--color-primary); stroke-dasharray: 6 5; }
    .oc-edges path.oc-hit { fill: none; pointer-events: stroke; stroke: transparent; stroke-width: 12; cursor: pointer; }
    .oc-arrhead { fill: var(--color-muted); }
    .oc-arrhead-selected { fill: var(--color-primary); }
    .oc-labels { position: absolute; inset: 0; pointer-events: none; }
    .oc-label { position: absolute; transform: translate(-50%, -50%); font-family: ui-monospace, monospace;
                font-size: 0.66rem; color: var(--color-muted); background: var(--arch-surface);
                border: 1px solid var(--color-border); border-radius: 999px; padding: 0 0.4rem; white-space: nowrap; }
    .oc-label-selected { color: var(--color-primary); border-color: var(--color-primary); }
    .oc-toolbar { position: absolute; z-index: 40; background: var(--arch-surface); border: 1px solid var(--color-border);
                  border-radius: 8px; padding: 2px 4px; box-shadow: 0 4px 14px rgba(0,0,0,0.3); }
    .oc-toolbar button { background: transparent; border: none; color: var(--color-danger); font-size: 0.9rem; }
    .oc-ref { font-family: ui-monospace, monospace; font-size: 0.74rem; }
    .oc-unset { color: var(--color-muted); font-style: italic; }
    .cg-head { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.15rem; }
    .cg-head input[data-act="res-id"] { font-family: ui-monospace, monospace; font-weight: 600; width: 100%; }
    .cg-type { font-family: ui-monospace, monospace; font-size: 0.72rem; color: var(--color-primary);
               cursor: help; margin-bottom: 0.3rem; }
    .cg-row { display: grid; grid-template-columns: 104px minmax(0, 1fr); gap: 0.2rem 0.5rem;
              align-items: center; margin-bottom: 0.3rem; }
    .cg-label { font-family: ui-monospace, monospace; font-size: 0.7rem; color: var(--color-muted); cursor: help; }
    .cg-field { display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center; }
    .cg-problem { border-left: 3px solid var(--color-danger); background: var(--arch-fail-bg);
                  font-size: 0.75rem; padding: 0.2rem 0.4rem; margin: 0.25rem 0; }
    button.fm-add { background: transparent; color: var(--color-primary); border: 1px dashed var(--color-border); }
    #arch-forms input, #arch-forms select { font: inherit; padding: 0.2rem 0.35rem; border: 1px solid var(--color-border);
                                            border-radius: 4px; background: var(--arch-surface); color: inherit; min-width: 0; }
    #arch-forms .oc-card input[type="text"] { width: 100%; font-family: ui-monospace, monospace; font-size: 0.8rem; }
    #arch-forms input[type="number"] { width: 4.2rem; font-size: 0.8rem; }
    #arch-forms .oc-card select { font-size: 0.8rem; }
    button.arch-del { background: transparent; color: var(--color-danger); border: none; padding: 0 0.3rem; font-size: 1rem; }
    .arch-panel { border: 1px solid var(--color-border); border-radius: 8px;
                  background: var(--arch-surface); padding: 1rem; }
    .arch-panel h2 { font-size: 1rem; margin: 0 0 0.75rem; }
    .arch-section { border-top: 1px solid var(--color-border); padding: 0.75rem 0; }
    .arch-section h3 { font-size: 0.85rem; margin: 0 0 0.5rem; text-transform: uppercase;
                       letter-spacing: 0.04em; color: var(--color-muted); }
    .arch-row { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; margin-bottom: 0.4rem; }
    .arch-mini { font-size: 0.8rem; color: var(--color-muted); }
    /* Task panel */
    .arch-goal { border-left: 3px solid var(--color-border); padding: 0.4rem 0.6rem; margin-bottom: 0.5rem; }
    .arch-goal.ok { border-left-color: var(--color-success); background: var(--arch-ok-bg); }
    .arch-goal.fail { border-left-color: var(--color-danger); background: var(--arch-fail-bg); }
    .arch-trace { font-size: 0.82rem; margin: 0.3rem 0 0; padding-left: 1.1rem; }
    .arch-trace li.ok::marker { content: "✓ "; color: var(--color-success); }
    .arch-trace li.fail::marker { content: "✗ "; color: var(--color-danger); }
    .arch-score { font-size: 1.4rem; font-weight: 700; }
  </style>
</head>
<body>
  <header class="site-header">
    <h1>Architecture Challenge</h1>
    <nav id="nav"><a href="index.html">← SAA-C03 Prep Home</a> <a href="vpc-explorer.html">VPC Explorer</a></nav>
  </header>
  <main id="arch-content">
    <section id="arch-landing" hidden></section>
    <section id="arch-workbench" hidden>
      <div id="arch-head"></div>
      <div class="arch-workbench">
        <div class="arch-panel" id="arch-forms" aria-label="Architecture design forms"></div>
        <div class="arch-panel" id="arch-task" aria-label="Task and results"></div>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <p>Unofficial study tool. Not affiliated with AWS. Progress stored locally in your browser.</p>
  </footer>
  <script type="module" src="js/arch-challenge.js"></script>
</body>
</html>
